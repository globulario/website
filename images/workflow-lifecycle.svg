<svg width="700" height="490" viewBox="0 0 700 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #162533; }
      .panel { fill: #1a1a2e; stroke: rgba(0,173,216,0.28); stroke-width: 1; rx: 12; }
      .panel-strong { fill: #1a1a2e; stroke: rgba(0,173,216,0.55); stroke-width: 1.2; rx: 12; }
      .panel-active { fill: #1a1a2e; stroke: rgba(0,173,216,0.88); stroke-width: 1.4; rx: 12; }
      .panel-dim { fill: rgba(26,26,46,0.78); stroke: rgba(0,173,216,0.18); stroke-width: 1; rx: 12; }
      .panel-success { fill: rgba(0,173,216,0.08); stroke: rgba(0,173,216,0.85); stroke-width: 1.4; rx: 12; }
      .panel-warn { fill: rgba(255,158,64,0.07); stroke: rgba(255,158,64,0.75); stroke-width: 1.4; rx: 12; }
      .panel-glow { fill: #1a1a2e; stroke: rgba(0,173,216,0.95); stroke-width: 1.4; rx: 12; filter: url(#glow); }
      .section { fill: rgba(15,25,35,0.55); stroke: rgba(0,173,216,0.22); stroke-width: 1; rx: 14; }
      .title { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 600; font-size: 18px; }
      .subtitle { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 600; font-size: 14px; }
      .text { fill: #d7e1ea; font-family: Inter, Arial, sans-serif; font-size: 12px; }
      .muted { fill: #8da0b3; font-family: Inter, Arial, sans-serif; font-size: 11px; }
      .tiny { fill: #8da0b3; font-family: Inter, Arial, sans-serif; font-size: 10px; }
      .state { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 600; font-size: 13px; }
      .arrow { stroke: rgba(0,173,216,0.68); stroke-width: 1.6; fill: none; marker-end: url(#arrowhead); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-thin { stroke: rgba(0,173,216,0.55); stroke-width: 1.2; fill: none; marker-end: url(#arrowheadSmall); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-dashed { stroke-dasharray: 5 4; }
      .link { stroke: rgba(0,173,216,0.38); stroke-width: 1.2; fill: none; stroke-linecap: round; }
      .divider { stroke: rgba(0,173,216,0.18); stroke-width: 1; }
      .chip { fill: rgba(0,173,216,0.09); stroke: rgba(0,173,216,0.30); stroke-width: 1; rx: 8; }
      .pill { fill: #1a1a2e; stroke: rgba(0,173,216,0.38); stroke-width: 1.15; rx: 15; }
      .pill-strong { fill: #1a1a2e; stroke: rgba(0,173,216,0.92); stroke-width: 1.35; rx: 15; }
      .pill-dim { fill: rgba(26,26,46,0.74); stroke: rgba(0,173,216,0.18); stroke-width: 1.05; rx: 15; }
      .num { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 700; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#00ADD8" opacity="0.75"></polygon>
    </marker>
    <marker id="arrowheadSmall" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#00ADD8" opacity="0.65"></polygon>
    </marker>
    
  </defs>
  <rect width="700" height="490" class="bg"></rect>
  <text x="350" y="34" text-anchor="middle" class="title">Workflow Lifecycle</text>
  <rect x="240" y="55" width="220" height="72" class="panel-strong"></rect>
  <text x="350.0" y="79" text-anchor="middle" class="state">PENDING</text>
  <text x="350.0" y="98" text-anchor="middle" class="muted">queued, waiting for</text>
  <text x="350.0" y="113" text-anchor="middle" class="muted">semaphore slot</text>
  <rect x="240" y="155" width="220" height="72" class="panel-active"></rect>
  <text x="350.0" y="179" text-anchor="middle" class="state">EXECUTING</text>
  <text x="350.0" y="198" text-anchor="middle" class="muted">steps running</text>
  <text x="350.0" y="213" text-anchor="middle" class="muted">sequentially</text>
  <rect x="55" y="290" width="120" height="52" class="panel-success"></rect>
  <text x="115" y="321" text-anchor="middle" class="state">SUCCEEDED</text>
  <rect x="240" y="290" width="120" height="52" class="panel-warn"></rect>
  <text x="300" y="321" text-anchor="middle" class="state">FAILED</text>
  <rect x="425" y="290" width="120" height="52" class="panel-strong"></rect>
  <text x="485" y="321" text-anchor="middle" class="state">BLOCKED</text>
  <rect x="560" y="290" width="120" height="52" class="panel-dim"></rect>
  <text x="620" y="321" text-anchor="middle" class="state">ROLLED_BACK</text>
  <rect x="240" y="370" width="120" height="48" class="panel-strong"></rect>
  <text x="300" y="398" text-anchor="middle" class="state">RETRYING</text>
  <rect x="240" y="435" width="150" height="40" class="panel-dim"></rect>
  <text x="315" y="459" text-anchor="middle" class="state">CANCELED</text>
  <rect x="405" y="435" width="150" height="40" class="panel-dim"></rect>
  <text x="480" y="459" text-anchor="middle" class="state">SUPERSEDED</text>
  <path d="M350 127 L350 155" class="arrow"></path>
  <path d="M350 227 L115 290" class="arrow"></path>
  <path d="M350 227 L300 290" class="arrow"></path>
  <path d="M350 227 L485 290" class="arrow"></path>
  <path d="M350 227 L620 290" class="arrow"></path>
  <path d="M300 342 L300 370" class="arrow"></path>
  <path d="M300 418 C385 418, 385 245, 350 245" class="arrow"></path>
  <path d="M485 342 C520 342, 520 180, 420 180" class="arrow arrow-dashed"></path>
  <text x="495" y="250" class="tiny">dependency satisfied</text>
  <path d="M300 342 L300 435" class="arrow"></path>
  <path d="M300 342 L480 435" class="arrow-thin"></path>
</svg>